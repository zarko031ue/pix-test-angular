<button
  type="button"
  class="inline-flex items-center justify-center rounded-md font-semibold cursor-pointer border border-transparent transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
  [ngClass]="[variantClass, sizeClass]"
  [disabled]="loading || disabled"
>
  @if (loading) {
    <span>Loading&hellip;</span>
  } @else {
    <ng-content></ng-content>
  }
</button>
