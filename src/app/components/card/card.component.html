<article
  class="rounded-lg border border-line p-4"
  [ngClass]="elevated ? 'bg-surface-raised shadow-[0_4px_12px_rgba(0,0,0,0.06)]' : 'bg-surface'"
>
  @if (title || description) {
    <header class="mb-4 flex flex-col gap-1">
      @if (title) {
        <h3 class="m-0 text-lg font-semibold text-ink">{{ title }}</h3>
      }
      @if (description) {
        <p class="m-0 text-xs text-ink-soft">{{ description }}</p>
      }
    </header>
  }
  <div>
    <ng-content></ng-content>
  </div>
</article>
