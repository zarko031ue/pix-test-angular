<div class="flex flex-col gap-1">
  @if (label) {
    <label class="text-xs font-medium text-ink">{{ label }}</label>
  }
  <input
    class="h-10 rounded-md border bg-surface-raised px-4 text-sm text-ink focus:outline focus:outline-2 focus:outline-offset-1 focus:outline-brand"
    [ngClass]="error ? 'border-danger' : 'border-line'"
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
  />
  @if (error) {
    <span class="text-xs text-danger">{{ error }}</span>
  }
</div>
